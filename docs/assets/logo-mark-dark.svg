<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="100 119 352 352">
  <!-- Ōtori brand mark, transparent — light ring, for DARK backgrounds.
       Same geometry as logo.svg minus the tile; the ring hole is truly
       transparent, so feathers are masked out inside the ring instead of
       being covered by a background-colored disc.
       viewBox is tightened to the content's real bounds (same box as
       BrandMark in src/icons.tsx) — the old 84 92 400 400 box carried
       ~15% dead margin from the raw geometry. -->
  <defs>
    <mask id="ring-hole">
      <rect x="100" y="119" width="352" height="352" fill="white"/>
      <circle cx="226" cy="350" r="96" fill="black"/>
    </mask>
  </defs>
  <g mask="url(#ring-hole)">
    <g transform="translate(226 350)">
      <g transform="rotate(-14)"><path d="M 0 0 C 30 -60 30 -166 0 -224 C -30 -166 -30 -60 0 0 Z" fill="#FFBB00"/></g>
      <g transform="rotate(16)"><path d="M 0 0 C 30 -64 30 -178 0 -238 C -30 -178 -30 -64 0 0 Z" fill="#FF66BB"/></g>
      <g transform="rotate(46)"><path d="M 0 0 C 30 -64 30 -178 0 -238 C -30 -178 -30 -64 0 0 Z" fill="#33DD99"/></g>
      <g transform="rotate(76)"><path d="M 0 0 C 30 -60 30 -166 0 -224 C -30 -166 -30 -60 0 0 Z" fill="#BB88EE"/></g>
    </g>
  </g>
  <circle cx="226" cy="350" r="96" fill="none" stroke="#e8e6e3" stroke-width="44"/>
</svg>
