name: Release

# Tag-triggered three-platform build. Pushing a v* tag builds the Tauri
# bundles on each OS and attaches them to the GitHub Release for that
# tag (creating it as a draft if it doesn't exist yet, so a hand-written
# release body is never overwritten).
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  bundle:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            bundles: dmg
            artifacts: |
              target/release/bundle/dmg/*.dmg
          - os: ubuntu-latest
            bundles: deb,appimage
            artifacts: |
              target/release/bundle/deb/*.deb
              target/release/bundle/appimage/*.AppImage
          - os: windows-latest
            bundles: msi,nsis
            artifacts: |
              target/release/bundle/msi/*.msi
              target/release/bundle/nsis/*.exe
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      # Same prerequisite set as ci.yml — keep the two lists in sync.
      - name: Install Tauri system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-release-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-release-${{ runner.os }}-
            cargo-${{ runner.os }}-

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      # The app crate bundles models/*.onnx as Tauri resources (see
      # ci.yml for the full rationale).
      - name: Fetch bundled ONNX models
        run: scripts/download-models.sh

      - name: Build Tauri bundles
        run: pnpm tauri build --bundles ${{ matrix.bundles }}

      # Unsigned on every platform — signing/notarization is a 1.0-bar
      # item (CONTRIBUTING.md § "Reaching 1.0").
      - name: Attach bundles to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          gh release view "$tag" >/dev/null 2>&1 || \
            gh release create "$tag" --draft --title "$tag" --notes "Draft — CI-built bundles."
          files=$(ls ${{ matrix.artifacts }} 2>/dev/null)
          [ -n "$files" ] || { echo "no artifacts matched"; exit 1; }
          gh release upload "$tag" $files --clobber
