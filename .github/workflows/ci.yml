name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        # macOS is the primary platform; Windows (x86_64) is a supported
        # second target. The core avoids mac-only APIs, so the same
        # workspace test suite proves both. git-bash on the Windows
        # runner lets the shell scripts (download-models.sh) run as-is.
        os: [macos-14, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      # The app crate bundles models/*.onnx as Tauri resources, so its
      # build script fails if that glob matches nothing. The weights are
      # gitignored artifacts — fetch the bundled small + mel set the same
      # way a fresh checkout does (scripts/download-models.sh). The
      # ignored model-gated analysis tests still stay out of CI; only the
      # build needs the files, not the test suite.
      - name: Fetch bundled ONNX models
        run: scripts/download-models.sh

      - name: Rust workspace tests
        run: cargo test --workspace --quiet

      - name: Build the CLI (acceptance needs the binary)
        run: cargo build -p otori-cli --quiet

      # The acceptance contract (AGENTS.md) is a bash script that couples
      # to unix semantics; it runs on macOS where the CLI's agent surface
      # is canonically exercised. The Windows job instead proves the build
      # + the full workspace test suite (including the cross-platform
      # default_path library_dir tests, which assert Windows paths when
      # run on a Windows host).
      - name: CLI acceptance contract (AGENTS.md)
        if: matrix.os == 'macos-14'
        run: scripts/acceptance.sh target/debug/otori

      - name: Frontend typecheck
        run: pnpm exec tsc --noEmit

      - name: Frontend unit tests
        run: pnpm exec vitest run --silent
